<!DOCTYPE html>
<html>
<head>
<style> 
.scene {
  width: 200px;
  height: 200px;
  /* Adds depth to the scene */
  perspective: 600px; 
}

.cube {
  left: 50%;
  top: 50%;
  width: 100%;
  height: 100%;
  position: relative;
  /* Ensures children are positioned in 3D space */
  transform-style: preserve-3d;
  /* Optional: Add a rotating animation */
  animation: spin 5s infinite linear; 
}

.face {
  position: absolute;
  width: 200px;
  height: 200px;
  /* Center the content of each face */
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  color: white;
  border: 1px solid rgba(0, 0, 0, 0.2);
}

/* Position and color each face */
.front  { background: rgba(255, 0, 0, 0.7); transform: translateZ(100px); }
.back   { background: rgba(0, 255, 0, 0.7); transform: rotateY(180deg) translateZ(100px); }
.right  { background: rgba(0, 0, 255, 0.7); transform: rotateY(90deg) translateZ(100px); }
.left   { background: rgba(255, 255, 0, 0.7); transform: rotateY(-90deg) translateZ(100px); }
.top    { background: rgba(255, 0, 255, 0.7); transform: rotateX(90deg) translateZ(100px); }
.bottom { background: rgba(0, 255, 255, 0.7); transform: rotateX(-90deg) translateZ(100px); }

/* Keyframes for the optional rotation animation */
@keyframes spin {
  from { transform: rotateX(0deg) rotateY(0deg); }
  to { transform: rotateX(360deg) rotateY(360deg); }
}
</style>
</head>
<body>
<h1>3D-cube</h1>
<div class="scene">
  <div class="cube">
    <div class="face front">1</div>
    <div class="face back">2</div>
    <div class="face right">3</div>
    <div class="face left">4</div>
    <div class="face top">5</div>
    <div class="face bottom">6</div>
  </div>
</div>
</body>
</html>
