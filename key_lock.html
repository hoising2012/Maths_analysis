<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.lock-container {
        position: absolute;
	top: 20%; 
        left: 20%;
	transform: translate(-50%, -50%);
}
#lock {
      height: 100px;
      width: 100px;
}
#unlock {
      height: 100px;
      width: 100px;
}
.hidden {
  display: none; /* or visibility: hidden; */
}
</style>
</head>
<body>
<div class="lock-container">
<button id="icon-toggle" aria-label="Toggle Play/Pause">

<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" id="lock" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="hidden" id="unlock" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M12 0a4 4 0 0 1 4 4v2.5h-1V4a3 3 0 1 0-6 0v2h.5A2.5 2.5 0 0 1 12 8.5v5A2.5 2.5 0 0 1 9.5 16h-7A2.5 2.5 0 0 1 0 13.5v-5A2.5 2.5 0 0 1 2.5 6H8V4a4 4 0 0 1 4-4"/>
</svg>
</div>
</button>
<script>
   	const button = document.getElementById('icon-toggle');
        const playIcon = document.getElementById('lock');
        const pauseIcon = document.getElementById('unlock');

	button.addEventListener('click', () => {
  	playIcon.classList.toggle('hidden');
  	pauseIcon.classList.toggle('hidden');
});
</script>
</body>
</html>
