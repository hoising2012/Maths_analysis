<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.form_wrapper{
  margin: 0 auto;    /* Sets top/bottom margins to 0, and left/right to auto */
  width: 50%;        /* A width is required for this method to work (cannot be 100% or auto) */
  max-width: 500px;  /* Optional: ensures responsiveness on smaller screens */
  display: block;
  margin-top: 50px;
} 

form {
  max-width: 400px;
  margin: 0 auto; /* Center the form on the page */
  padding: 20px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

label {
  display: block; /* Make labels take their own line */
  margin-bottom: 5px;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="form_wrapper">
<form id="registrationForm" onsubmit="return validateForm()">
    <label for="password">Password:</label>
    <input type="password" id="password" required>
    
    <label for="confirmPassword">Confirm Password:</label>
    <input type="password" id="confirmPassword" required> 
    
    <button type="submit" id="submitButton">Submit</button>
</form>
</div>
<script>
   	function validateForm() {
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    
    if (password !== confirmPassword) {
        // Passwords do not match
        alert("Passwords do not match");
        // Prevent form submission
        return false; 
    } else {
        // Passwords match
        alert("Passwords match");
        // Allow form submission to proceed
        return true; 
    }
}
</script>
</body>
</html>
